spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:sqlite:${DB_PATH:/data/portfolio.db}
    driver-class-name: org.sqlite.JDBC
  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Tokyo
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.portfolio: ${LOG_LEVEL:INFO}

app:
  jquants:
    base-url: https://api.jquants.com
    timeout-seconds: 5
    id-token-ttl-hours: 24
  google:
    docs-timeout-seconds: 10
